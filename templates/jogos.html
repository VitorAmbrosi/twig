{% extends "_base.html" %}

{% block conteudo %}


{% set estilos = {
    'acao': 'Ação',
    'tiro': 'Tiro',
    'rpg': 'RPG',
}%}
<h3>Lista de jogos</h3>
<a href="jogos_inserir.php" style="color: blue; border: solid blue 1px; border-radius: 10px; text-decoration: none; padding: 5px;">+ Novo Jogo</a>
<br><br>
<table border="1" style="border-collapse: collapse; border-color: yellowgreen;">
    <tr>
        <th>Nome</th>
        <th>Estilo</th>
        <th>Capa</th>
    </tr>
    {% for jogo in jogos %}
    <tr>
        <td>{{ jogo.nome }}</td>
        <td>{{ estilos[jogo.estilo] ?? "Não encontrado"}}</td>
        <td><img src="img/{{jogo.capa}}" alt="" width="100px"></td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
